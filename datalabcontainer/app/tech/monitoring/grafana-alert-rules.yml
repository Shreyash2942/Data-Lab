apiVersion: 1

groups:
  - orgId: 1
    name: datalab-platform-alerts
    folder: Data Lab
    interval: 1m
    rules:
      - uid: datalab-service-down
        title: Data Lab Service Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __PROM_DS_UID__
            model:
              datasource:
                type: prometheus
                uid: __PROM_DS_UID__
              editorMode: code
              expr: min_over_time(datalab_service_up{scope!=""}[5m])
              instant: true
              intervalMs: 1000
              legendFormat: "{{service}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              settings:
                mode: dropNN
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Data Lab service is down"
          description: "Service {{ $labels.service }} in scope {{ $labels.scope }} has remained unhealthy for at least 2 minutes."
        labels:
          severity: critical
          category: service

      - uid: datalab-probe-fail
        title: Data Lab Probe Failure
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __PROM_DS_UID__
            model:
              datasource:
                type: prometheus
                uid: __PROM_DS_UID__
              editorMode: code
              expr: min_over_time(datalab_probe_success[5m])
              instant: true
              intervalMs: 1000
              legendFormat: "{{probe}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              settings:
                mode: dropNN
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Data Lab deep probe failure"
          description: "Probe {{ $labels.probe }} has reported failures for at least 2 minutes."
        labels:
          severity: warning
          category: probe

      - uid: datalab-stale-scrape
        title: Data Lab Stale Scrape
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __PROM_DS_UID__
            model:
              datasource:
                type: prometheus
                uid: __PROM_DS_UID__
              editorMode: code
              expr: time() - max(datalab_service_last_scrape_timestamp_seconds{scope="all"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              settings:
                mode: dropNN
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 120
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 2m
        annotations:
          summary: "Data Lab scrape is stale"
          description: "Health exporter service metrics have not refreshed within 120 seconds."
        labels:
          severity: critical
          category: scrape

      - uid: datalab-pg-pressure
        title: Data Lab PostgreSQL Pressure High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __PROM_DS_UID__
            model:
              datasource:
                type: prometheus
                uid: __PROM_DS_UID__
              editorMode: code
              expr: datalab_postgres_connections_active / clamp_min(datalab_postgres_connections_max, 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              settings:
                mode: dropNN
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.85
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "PostgreSQL connection pressure is high"
          description: "Active PostgreSQL connections are above 85% of max_connections for at least 5 minutes."
        labels:
          severity: warning
          category: database
          db: postgres

      - uid: datalab-redis-blocked
        title: Data Lab Redis Blocked Clients
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __PROM_DS_UID__
            model:
              datasource:
                type: prometheus
                uid: __PROM_DS_UID__
              editorMode: code
              expr: datalab_redis_blocked_clients
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              settings:
                mode: dropNN
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Redis has blocked clients"
          description: "Redis blocked clients metric stayed above zero for at least 5 minutes."
        labels:
          severity: warning
          category: database
          db: redis

      - uid: datalab-trino-queued
        title: Data Lab Trino Queued Queries High
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __PROM_DS_UID__
            model:
              datasource:
                type: prometheus
                uid: __PROM_DS_UID__
              editorMode: code
              expr: datalab_trino_queries_queued
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              settings:
                mode: dropNN
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 20
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Trino queued query pressure is high"
          description: "Trino queued queries remained above 20 for at least 5 minutes."
        labels:
          severity: warning
          category: database
          db: trino
