name: Docker Portfolio CI

on:
  workflow_dispatch:
    inputs:
      push_to_dockerhub:
        description: "Push image to Docker Hub (portfolio demo mode)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: dockerhub-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dockerhub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Dockerfile path
        id: resolve
        shell: bash
        run: |
          if [ -f "datalabcontainer/dev/base/Dockerfile" ]; then
            echo "dockerfile=datalabcontainer/dev/base/Dockerfile" >> "$GITHUB_OUTPUT"
            echo "context=." >> "$GITHUB_OUTPUT"
          elif [ -f "dev/base/Dockerfile" ]; then
            echo "dockerfile=dev/base/Dockerfile" >> "$GITHUB_OUTPUT"
            echo "context=." >> "$GITHUB_OUTPUT"
          else
            echo "No supported Dockerfile found." >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required secrets
        if: ${{ inputs.push_to_dockerhub }}
        shell: bash
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "Missing DOCKERHUB_USERNAME secret" >&2
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Missing DOCKERHUB_TOKEN secret" >&2
            exit 1
          fi

      - name: Log in to Docker Hub
        if: ${{ inputs.push_to_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: ${{ inputs.push_to_dockerhub }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/data-lab
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build image (no push, local CI validation)
        if: ${{ !inputs.push_to_dockerhub }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.resolve.outputs.context }}
          file: ${{ steps.resolve.outputs.dockerfile }}
          push: false
          cache-from: |
            type=gha,scope=dockerhub-main
          cache-to: |
            type=gha,mode=max,scope=dockerhub-main
          provenance: false

      - name: Build and push image (optional)
        if: ${{ inputs.push_to_dockerhub }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.resolve.outputs.context }}
          file: ${{ steps.resolve.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=dockerhub-main
          cache-to: |
            type=gha,mode=max,scope=dockerhub-main
          provenance: false
